# ==================================================
# 🛍️ CONFIGURACIÓN GENERAL DE LA APLICACIÓN
# ==================================================
spring.application.name=profumi-app
server.port=8080

# Configuración de Límites de Subida de Archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================================================
# 🍃 CONFIGURACIÓN DE MONGODB
# ==================================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/profumi_db}

# ==================================================
# 🖥️ CONFIGURACIÓN DE THYMELEAF
# ==================================================
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==================================================
# 💳 CONFIGURACIÓN DE STRIPE (MODO DE PRUEBA)
# ==================================================
stripe.api.key.public=${STRIPE_PUBLIC_KEY:}
stripe.api.key.secret=${STRIPE_SECRET_KEY:}

# ==================================================
# 📧 CONFIGURACIÓN PARA ENVÍO DE CORREOS (GMAIL)
# ==================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:cardenaswalker1@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==================================================
# 📞 CONFIGURACIÓN DE TWILIO
# ==================================================
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+16802244274}

# ==================================================
# 🔑 CONFIGURACIÓN DE OAUTH2 Y SECURITY
# ==================================================

# --- Google ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ==================================================
# 🤖 CONFIGURACIÓN DE GROQ (IA PARA DIAGNÓSTICO)
# ==================================================
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
