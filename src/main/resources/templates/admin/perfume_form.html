<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Perfume | Profumi Cartagena</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #c5a059;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .form-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .form-header { margin-bottom: 2.5rem; text-align: center; }
        .form-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .form-header p { color: #888; font-size: 0.9rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group.full { grid-column: span 2; }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            color: #fff;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary { background: var(--primary); color: var(--dark); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2); }
        .btn-cancel { background: transparent; color: #888; border: 1px solid var(--glass-border); }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }

        /* Responsive Design System Overrides */
        @media (max-width: 768px) {
            body {
                padding: 1rem !important;
            }
            .form-container {
                padding: 1.5rem !important;
                border-radius: 20px !important;
            }
            .form-grid {
                grid-template-columns: 1fr !important;
                gap: 1rem !important;
            }
            .form-group.full {
                grid-column: span 1 !important;
            }
            .actions {
                flex-direction: column !important;
            }
            .btn {
                width: 100% !important;
                text-align: center !important;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1 th:text="${perfume.id == null ? 'Nuevo Perfume' : 'Editar Perfume'}">Gestionar Perfume</h1>
            <p>Complete los detalles técnicos de la fragancia</p>
        </div>

        <form th:action="@{/admin/perfumes/guardar}" th:object="${perfume}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" placeholder="Ej: Sauvage" required>
                </div>
                <div class="form-group">
                    <label>Marca</label>
                    <input type="text" th:field="*{marca}" placeholder="Ej: Dior" required>
                </div>
                <div class="form-group">
                    <label>SKU</label>
                    <input type="text" th:field="*{sku}" placeholder="P-001">
                </div>
                <div class="form-group">
                    <label>Precio ($)</label>
                    <input type="number" step="0.01" th:field="*{precio}" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" th:field="*{stock}" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Imagen URL</label>
                    <input type="text" th:field="*{imagenUrl}" placeholder="https://...">
                </div>
                <div class="form-group full">
                    <label>Descripción</label>
                    <textarea th:field="*{descripcion}" rows="3" placeholder="Descripción de la fragancia..."></textarea>
                </div>
                <div class="form-group">
                    <label>Clima</label>
                    <select th:field="*{climaRecomendado}">
                        <option value="Cálido">Cálido</option>
                        <option value="Frío">Frío</option>
                        <option value="Templado">Templado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ocasión</label>
                    <select th:field="*{ocasion}">
                        <option value="Diario">Diario</option>
                        <option value="Noche">Noche</option>
                        <option value="Cita">Cita</option>
                        <option value="Trabajo">Trabajo</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <a href="/admin/perfumes" class="btn btn-cancel">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Perfume</button>
            </div>
        </form>
    </div>
</body>
</html>
