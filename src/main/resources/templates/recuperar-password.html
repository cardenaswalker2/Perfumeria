<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Recuperar Contraseña | Profumi</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/css/style.css(v=5)}">
    <link rel="stylesheet" th:href="@{/css/login.css(v=5)}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .recover-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: radial-gradient(circle at 10% 20%, rgba(254, 252, 249, 1) 0%, rgba(245, 240, 230, 1) 90%);
        }
        .recover-card {
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .success-box {
            background: rgba(46, 196, 182, 0.05);
            border: 1px solid rgba(46, 196, 182, 0.2);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .success-box i {
            color: #2ec4b6;
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }
        .success-box p {
            color: var(--text-dark);
            line-height: 1.8;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar fragment -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Toast container for notifications -->
    <div class="toast-container" id="toast-container"></div>

    <main class="recover-container" style="margin-top: 70px;">
        <div class="login-card recover-card">
            <div class="login-logo-box">
                <span class="login-logo-text">profumi</span>
                <h1 style="font-family: var(--font-serif); font-size: 1.8rem; font-weight: 400; margin-top: 1rem; color: var(--text-heading);">Recuperar Contraseña</h1>
            </div>

            <!-- Successful recovery mail request -->
            <div th:if="${successMsg}" class="success-box">
                <i class="fa-regular fa-paper-plane"></i>
                <p th:text="${successMsg}">Hemos enviado las instrucciones a tu correo.</p>
            </div>

            <!-- Recovery form -->
            <form th:unless="${successMsg}" th:action="@{/recuperar-password}" method="post" id="recover-form" novalidate>
                <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 2rem;">
                    Ingresa la dirección de correo electrónico asociada a tu cuenta. Te enviaremos un enlace seguro para restablecer tu contraseña.
                </p>

                <!-- Email Input -->
                <div class="form-group" style="text-align: left;">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope prefix-icon"></i>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="tu@correo.com" autocomplete="email" required autofocus>
                    </div>
                    <span class="error-message" id="email-error">Por favor ingresa un correo electrónico válido</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-login" id="btn-submit" style="margin-top: 1rem; margin-bottom: 1.5rem;">
                    <span id="btn-text">Enviar enlace de recuperación</span>
                </button>
            </form>

            <a href="/login" style="display: inline-block; color: var(--text-dark); font-weight: 600; text-decoration: none; border-bottom: 1.5px solid var(--accent-primary); font-size: 0.9rem; margin-top: 1rem;">
                <i class="fa-solid fa-arrow-left-long" style="margin-right: 8px;"></i> Volver al inicio de sesión
            </a>
        </div>
    </main>

    <!-- Verification / Validation Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const emailError = document.getElementById('email-error');
            const form = document.getElementById('recover-form');
            const submitBtn = document.getElementById('btn-submit');

            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(String(email).toLowerCase());
            }

            if (emailInput) {
                emailInput.addEventListener('input', () => {
                    if (emailInput.value.length === 0) {
                        emailInput.classList.remove('is-valid', 'is-invalid');
                        emailError.classList.remove('visible');
                    } else if (validateEmail(emailInput.value)) {
                        emailInput.classList.add('is-valid');
                        emailInput.classList.remove('is-invalid');
                        emailError.classList.remove('visible');
                    } else {
                        emailInput.classList.add('is-invalid');
                        emailInput.classList.remove('is-valid');
                    }
                });
            }

            if (form) {
                form.addEventListener('submit', (e) => {
                    if (!validateEmail(emailInput.value)) {
                        e.preventDefault();
                        emailInput.classList.add('is-invalid');
                        emailError.classList.add('visible');
                        
                        // Shaking animation
                        const card = document.querySelector('.recover-card');
                        card.style.animation = 'none';
                        setTimeout(() => {
                            card.style.animation = 'shake 0.4s ease-in-out';
                        }, 10);
                    } else {
                        submitBtn.disabled = true;
                        submitBtn.classList.add('loading');
                        submitBtn.innerHTML = '<span class="spinner"></span> <span>Enviando enlace...</span>';
                    }
                });
            }
        });
    </script>
</body>
</html>
